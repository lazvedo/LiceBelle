<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
    <title>Ops..</title>
    <style>
        body{
    background: linear-gradient(135deg, #E8C5C1 0%, #D4A8A4 40%, #C49090 100%);
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
}

h1{
    font-family: 'Cormorant Garamond', serif; 
    font-weight: 900;
}

h3{
    font-family: 'Jost', sans-serif;
    font-weight: 100; 
    color: #7A6558;
}

* { cursor: none; } /* esconde o cursor padrão */

.cursor {
  width: 8px;
  height: 8px;
  background: #C9908A; /* troca pela cor que quiser */
  border-radius: 50%;
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%, -50%);
}

.cursor-ring {
  width: 36px;
  height: 36px;
  border: 0.5px solid #C9908A;
  border-radius: 50%;
  position: fixed;
  pointer-events: none;
  z-index: 9998;
  transform: translate(-50%, -50%);
  transition: width 0.3s, height 0.3s;
  opacity: 0.5;
}

.back{
  border: solid 1px #7A6558;
  border-radius: 20px;
  padding: 5px 30px;
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.btn{
  text-decoration: none;
  color: black;
}

.back:hover{
  transform: scale(1.05);
}

.back:active{
  transform: scale(1.0);
  transition: transform 0.1s ease;
}
    </style>
</head>
<body>
    <div class="cursor" id="cursor"></div>
    <div class="cursor-ring" id="cursorRing"></div>

    <h1>Este serviço está temporariamente indisponível</h1>
    <h3>tente novamente mais tarde</h3>

    <div class="back"><a class="btn" href="index.html">Voltar</a></div>
    <script>
        const cursor = document.getElementById('cursor');
        const ring = document.getElementById('cursorRing');
        let mx = 0, my = 0, rx = 0, ry = 0;

document.addEventListener('mousemove', e => {
  mx = e.clientX;
  my = e.clientY;
  cursor.style.left = mx + 'px';
  cursor.style.top = my + 'px';
});

function animateRing() {
  rx += (mx - rx) * 0.12; /* controla a velocidade do anel — menor = mais lento */
  ry += (my - ry) * 0.12;
  ring.style.left = rx + 'px';
  ring.style.top = ry + 'px';
  requestAnimationFrame(animateRing);
}
animateRing();

/* Efeito ao passar em cima de links e botões */
document.querySelectorAll('a, button').forEach(el => {
  el.addEventListener('mouseenter', () => {
    ring.style.width = '56px';
    ring.style.height = '56px';
    ring.style.opacity = '0.3';
  });
  el.addEventListener('mouseleave', () => {
    ring.style.width = '36px';
    ring.style.height = '36px';
    ring.style.opacity = '0.5';
  });
});
    </script>
</body>
</html>
